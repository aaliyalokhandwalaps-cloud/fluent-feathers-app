<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluent Feathers Academy - Login</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#B05D9E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fluent Feathers Academy">
  <link rel="icon" href="/app-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #B05D9E 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      padding: 50px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 4em;
      margin-bottom: 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 2em;
    }

    p {
      color: #7f8c8d;
      margin-bottom: 40px;
      font-size: 1.1em;
    }

    .login-options {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-btn {
      padding: 20px;
      border: none;
      border-radius: 10px;
      font-size: 1.2em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: block;
    }

    .admin-btn {
      background: #B05D9E;
      color: white;
    }

    .admin-btn:hover {
      background: #9A4D88;
      transform: translateY(-2px);
    }

    .parent-btn {
      background: #27ae60;
      color: white;
    }

    .parent-btn:hover {
      background: #229954;
      transform: translateY(-2px);
    }

    .install-hint {
      margin-top: -4px;
      display: none;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .install-btn {
      background: #2d1245;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .install-btn:hover {
      background: #4a2070;
    }

    .install-note {
      color: #6b7280;
      margin: 0;
      font-size: 0.92rem;
    }

    /* Admin Password Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 15px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal-content h2 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .modal-content p {
      color: #7f8c8d;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #34495e;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
    }

    .form-group input:focus {
      outline: none;
      border-color: #B05D9E;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-submit {
      flex: 1;
      background: #B05D9E;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-submit:hover {
      background: #9A4D88;
    }

    .btn-cancel {
      flex: 1;
      background: #95a5a6;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 5px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-cancel:hover {
      background: #7f8c8d;
    }

    .error-message {
      color: #e74c3c;
      margin-top: 10px;
      font-size: 0.9em;
      display: none;
    }

    @media (max-width: 600px) {
      .login-container {
        padding: 30px;
      }

      h1 {
        font-size: 1.5em;
      }

      .logo {
        font-size: 3em;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🎓</div>
    <h1>Fluent Feathers Academy</h1>
    <p>Learning Management System</p>

    <div class="login-options">
      <button onclick="showAdminLogin()" class="login-btn admin-btn">
        👩‍🏫 Admin Login
      </button>
      <a href="parent.html" class="login-btn parent-btn">
        👨‍👩‍👧 Parent Login
      </a>
      <div id="installHint" class="install-hint">
        <button id="installAppBtn" class="install-btn" type="button">Install Parent App</button>
        <p id="installNote" class="install-note">Add the portal to your home screen for app-like access.</p>
      </div>
    </div>
  </div>

  <!-- Admin Password Modal -->
  <div id="adminModal" class="modal">
    <div class="modal-content">
      <h2>🔐 Admin Login</h2>
      <p>Enter admin password to continue</p>

      <form id="adminLoginForm" onsubmit="return verifyAdminPassword(event)">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="adminPassword" required placeholder="Enter admin password">
        </div>

        <div class="error-message" id="errorMessage">
          ❌ Incorrect password. Please try again.
        </div>

        <div class="modal-buttons">
          <button type="submit" class="btn-submit">Login</button>
          <button type="button" onclick="closeAdminModal()" class="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let deferredInstallPrompt = null;
    const APP_INSTALLED_KEY = 'ff_parent_app_installed';
    const ADMIN_LOGIN_KEY = 'ff_admin_logged_in';

    async function registerPwaServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        await navigator.serviceWorker.register('/firebase-messaging-sw.js');
      } catch (err) {
        console.warn('PWA service worker registration failed:', err);
      }
    }

    function isIosInstallCandidate() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone;
    }

    function isAppInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches || !!window.navigator.standalone;
    }

    function isAppKnownInstalled() {
      return isAppInstalled() || localStorage.getItem(APP_INSTALLED_KEY) === '1';
    }

    function markAppInstalled() {
      localStorage.setItem(APP_INSTALLED_KEY, '1');
    }

    function syncInstallButton() {
      const installBtn = document.getElementById('installAppBtn');
      const note = document.getElementById('installNote');
      if (!installBtn || !note) return;
      if (isAppKnownInstalled() && !isAppInstalled()) {
        installBtn.textContent = 'Open in App';
        note.textContent = 'The app is already installed on this device.';
      } else {
        installBtn.textContent = 'Install Parent App';
        note.textContent = 'Add the portal to your home screen for app-like access.';
      }
    }

    function showInstallHint(message) {
      const wrap = document.getElementById('installHint');
      const note = document.getElementById('installNote');
      if (!wrap) return;
      if (isAppInstalled()) {
        wrap.style.display = 'none';
        return;
      }
      wrap.style.display = 'flex';
      if (note && message) note.textContent = message;
    }

    async function triggerInstallPrompt() {
      if (isAppKnownInstalled() && !isAppInstalled()) {
        window.location.href = '/parent.html';
        return;
      }
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice.catch(() => null);
        if (choice && choice.outcome === 'accepted') {
          markAppInstalled();
          const hint = document.getElementById('installHint');
          if (hint) hint.style.display = 'none';
        }
        deferredInstallPrompt = null;
        return;
      }
      if (isIosInstallCandidate()) {
        showInstallHint('On iPhone or iPad, tap Share and then "Add to Home Screen" to install the app.');
      }
    }

    registerPwaServiceWorker();
    if (isAppInstalled()) markAppInstalled();

    window.addEventListener('beforeinstallprompt', function(event) {
      if (isAppInstalled()) return;
      event.preventDefault();
      deferredInstallPrompt = event;
      syncInstallButton();
      showInstallHint('Install the parent portal for faster access and notifications.');
    });

    window.addEventListener('appinstalled', function() {
      markAppInstalled();
      deferredInstallPrompt = null;
      const hint = document.getElementById('installHint');
      if (hint) hint.style.display = 'none';
    });

    document.addEventListener('DOMContentLoaded', function() {
      const installBtn = document.getElementById('installAppBtn');
      if (installBtn) installBtn.addEventListener('click', triggerInstallPrompt);
      syncInstallButton();
      if (!isAppInstalled() && (isIosInstallCandidate() || isAppKnownInstalled())) {
        showInstallHint('On iPhone or iPad, tap Share and then "Add to Home Screen" to install the app.');
      }

      // Keep DB warm while the login page is open.
      let _loginDbPingInFlight = false;
      async function _loginDbPing() {
        if (_loginDbPingInFlight) return;
        _loginDbPingInFlight = true;
        try { await fetch('/api/db/ping', { cache: 'no-store' }); } catch (_) {}
        finally { _loginDbPingInFlight = false; }
      }
      setInterval(_loginDbPing, 30 * 1000);
      document.addEventListener('click', _loginDbPing, { passive: true });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') _loginDbPing();
      });
      _loginDbPing();
    });
    // ⚠️ CHANGE THIS PASSWORD TO YOUR OWN SECURE PASSWORD ⚠️
    // const ADMIN_PASSWORD = 'aaliya@190795';  // ← REMOVED FOR SECURITY

    function showAdminLogin() {
      if (localStorage.getItem(ADMIN_LOGIN_KEY) === '1') {
        window.location.href = 'admin.html';
        return;
      }
      document.getElementById('adminModal').style.display = 'flex';
      document.getElementById('adminPassword').focus();
    }

    function closeAdminModal() {
      document.getElementById('adminModal').style.display = 'none';
      document.getElementById('adminLoginForm').reset();
      document.getElementById('errorMessage').style.display = 'none';
    }

    async function verifyAdminPassword(event) {
      event.preventDefault();
      
      const enteredPassword = document.getElementById('adminPassword').value;
      const submitBtn = document.querySelector('#adminLoginForm button[type="submit"]');
      const originalText = submitBtn.textContent;
      
      // Show loading state
      submitBtn.textContent = 'Verifying...';
      submitBtn.disabled = true;
      
      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ password: enteredPassword })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Password correct - persist admin login until manual logout
          localStorage.setItem(ADMIN_LOGIN_KEY, '1');
          window.location.href = 'admin.html';
        } else {
          // Password incorrect - show error
          document.getElementById('errorMessage').style.display = 'block';
        }
      } catch (error) {
        console.error('Login error:', error);
        document.getElementById('errorMessage').textContent = 'Network error. Please try again.';
        document.getElementById('errorMessage').style.display = 'block';
      } finally {
        // Reset button state
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    }

    // Press Enter to submit
    document.addEventListener('keypress', function(event) {
      if (event.key === 'Enter' && document.getElementById('adminModal').style.display === 'flex') {
        verifyAdminPassword(event);
      }
    });

    // Press Escape to close modal
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeAdminModal();
      }
    });
  </script>
</body>
</html>
